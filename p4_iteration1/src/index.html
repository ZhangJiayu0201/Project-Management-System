<!DOCTYPE html>
<html>
<head>
    <title>Project Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Project Management System</h1>
    <p>This is a simple beginner version for Practical 4.</p>

    <h2>View Assigned Tasks</h2>
    <label for="memberFilter">Choose member:</label>
    <select id="memberFilter" onchange="showTasks()">
        <option value="All">All</option>
        <option value="Alex">Alex</option>
        <option value="Bella">Bella</option>
        <option value="Chris">Chris</option>
    </select>

    <div id="taskList"></div>

    <h2>Assign Team Tasks</h2>
    <label for="taskSelect">Task:</label>
    <select id="taskSelect"></select>

    <label for="memberSelect">Assign to:</label>
    <select id="memberSelect">
        <option value="Alex">Alex</option>
        <option value="Bella">Bella</option>
        <option value="Chris">Chris</option>
    </select>

    <button onclick="assignTask()">Assign Task</button>

    <p id="message"></p>

    <script src="app.js"></script>
</body>
</html>
